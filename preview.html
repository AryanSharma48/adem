    // --- PollutionSources Chart ---
    function PollutionSources() {

    // --- ForecastChart SVG Implementation (Smooth Gradient & Interactive) ---
    function ForecastChart() {
      const times = ["12 AM", "3 AM", "6 AM", "9 AM", "12 PM", "3 PM", "6 PM", "9 PM", "12 AM"];
      const values = [15, 14, 20, 35, 60, 78, 65, 40, 22];
      
      // Calculate SVG points based on container dimensions
      const points = values.map((val, idx) => {
        const x = (idx / 8) * 600 + 40;
        const y = 200 - (val / 100) * 160;
        return { x, y, val, time: times[idx] };
      });
      
      const pathD = `M ${points[0].x} ${points[0].y} ` + points.slice(1).map(p => `L ${p.x} ${p.y}`).join(' ');
      const areaD = `${pathD} L ${points[points.length-1].x} 200 L ${points[0].x} 200 Z`;

      return (
        <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 flex flex-col h-full">
          <div className="flex justify-between items-center mb-6">
            <h3 className="text-lg font-bold text-slate-900">24-Hour Air Quality Forecast</h3>
            <div className="flex space-x-4 text-[10px] font-bold uppercase tracking-wider text-slate-500">
              <div className="flex items-center"><span className="w-2.5 h-2.5 rounded-full bg-emerald-500 mr-2"></span> Good</div>
              <div className="flex items-center"><span className="w-2.5 h-2.5 rounded-full bg-yellow-400 mr-2"></span> Moderate</div>
              <div className="flex items-center"><span className="w-2.5 h-2.5 rounded-full bg-orange-500 mr-2"></span> Unhealthy</div>
              <div className="flex items-center"><span className="w-2.5 h-2.5 rounded-full bg-red-500 mr-2"></span> Very Unhealthy</div>
            </div>
          </div>

          <div className="flex-1 w-full relative min-h-[250px]">
            <p className="text-[10px] font-bold text-slate-400 absolute -top-4 left-0">PM2.5 µg/m³</p>
            
            <svg className="w-full h-full overflow-visible" viewBox="0 0 680 220">
              <defs>
                <linearGradient id="forecastGrad" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stopColor="#ef4444" stopOpacity="0.3"/>
                  <stop offset="100%" stopColor="#ef4444" stopOpacity="0"/>
                </linearGradient>
              </defs>
              
              {/* Horizontal Grid lines */}
              {[0, 25, 50, 75, 100].map(val => {
                const y = 200 - (val / 100) * 160;
                return (
                  <g key={val}>
                    <line x1="40" y1={y} x2="640" y2={y} stroke="#f1f5f9" strokeWidth="1" strokeDasharray="4" />
                    <text x="15" y={y + 4} fill="#94a3b8" fontSize="10" fontWeight="600">{val}</text>
                  </g>
                );
              })}
              
              {/* Area & Stroke */}
              <path d={areaD} fill="url(#forecastGrad)" />
              <path d={pathD} fill="none" stroke="#ef4444" strokeWidth="3" strokeLinecap="round" />
              
              {/* Dots */}
              {points.map((p, idx) => (
                <g key={idx} className="group cursor-pointer">
                  <circle cx={p.x} cy={p.y} r="5" fill="#fff" stroke="#ef4444" strokeWidth="2.5" />
                  <circle cx={p.x} cy={p.y} r="8" fill="#ef4444" className="opacity-0 group-hover:opacity-20 transition-opacity" />
                  {/* Tooltip on hover */}
                  <text x={p.x} y={p.y - 12} textAnchor="middle" fill="#0f172a" fontSize="11" fontWeight="bold" className="opacity-0 group-hover:opacity-100 transition-opacity bg-white px-1.5 py-0.5 rounded border shadow-sm">
                    {p.val}
                  </text>
                </g>
              ))}
              
              {/* Vertical Reference Line for Alert */}
              <line x1={points[5].x} y1="40" x2={points[5].x} y2="200" stroke="#ef4444" strokeWidth="1.5" strokeDasharray="4" />
              <circle cx={points[5].x} cy={points[5].y} r="6" fill="#ef4444" />
              <text x={points[5].x} y="30" textAnchor="middle" fill="#ef4444" fontSize="10" fontWeight="bold">Tomorrow 3:00 PM</text>
              <rect x={points[5].x - 12} y={points[5].y - 28} width="24" height="18" rx="4" fill="#ef4444" />
              <text x={points[5].x} y={points[5].y - 15} textAnchor="middle" fill="#fff" fontSize="10" fontWeight="bold">78</text>

              {/* X Axis Labels */}
              {points.map((p, idx) => (
                <text key={idx} x={p.x} y="218" textAnchor="middle" fill="#64748b" fontSize="10" fontWeight="600">{p.time}</text>
              ))}
            </svg>
          </div>
        </div>
      );
    }
